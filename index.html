<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldSnap 🌍</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #23263a;
      --border:    #2e3250;
      --accent:    #6c8eff;
      --accent-h:  #8ba4ff;
      --green:     #4caf7d;
      --yellow:    #f0c040;
      --red:       #e05c5c;
      --text:      #e8eaf0;
      --muted:     #8890b0;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.45);
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 640px;
      padding: 18px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -.5px;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    .streak-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 5px 14px;
      font-size: .82rem;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }

    .streak-badge strong { color: var(--yellow); font-size: 1rem; }

    /* ── Main ── */
    main {
      width: 100%;
      max-width: 640px;
      padding: 24px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    /* ── Photo ── */
    .photo-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface2);
      position: relative;
      box-shadow: var(--shadow);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter .4s;
    }

    .photo-wrap img.blurred { filter: blur(6px) brightness(.7); }

    .photo-label {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(4px);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: .78rem;
      color: #ccd;
      letter-spacing: .5px;
    }

    /* ── Attempts ── */
    .attempts-row {
      display: flex;
      gap: 10px;
    }

    .attempt-pip {
      height: 8px;
      flex: 1;
      border-radius: 99px;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: background .3s;
    }

    .attempt-pip.used-wrong  { background: var(--red); border-color: var(--red); }
    .attempt-pip.used-correct { background: var(--green); border-color: var(--green); }

    /* ── Hints ── */
    .hints-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .hint-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .9rem;
      color: var(--muted);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      animation: fadeSlide .35s ease;
    }

    .hint-item .hint-icon { flex-shrink: 0; font-size: 1rem; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Search dropdown ── */
    .input-group {
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }

    .input-group input:focus { border-color: var(--accent); }
    .input-group input::placeholder { color: var(--muted); }

    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 220px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: var(--shadow);
      display: none;
    }

    .dropdown.open { display: block; }

    .dropdown::-webkit-scrollbar { width: 6px; }
    .dropdown::-webkit-scrollbar-track { background: transparent; }
    .dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .dropdown-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: .95rem;
      transition: background .15s;
    }

    .dropdown-item:hover, .dropdown-item.active {
      background: var(--accent);
      color: #fff;
    }

    .dropdown-item.no-match {
      color: var(--muted);
      cursor: default;
      font-style: italic;
    }

    .dropdown-item.no-match:hover { background: transparent; }

    /* ── Guess button ── */
    .btn-guess {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    .btn-guess:hover  { background: var(--accent-h); }
    .btn-guess:active { transform: scale(.98); }
    .btn-guess:disabled {
      background: var(--surface2);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* ── Result card ── */
    #result-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
      text-align: center;
      display: none;
      flex-direction: column;
      gap: 16px;
      animation: fadeSlide .4s ease;
    }

    #result-section.show { display: flex; }

    .result-outcome {
      font-size: 1.6rem;
      font-weight: 800;
    }

    .result-outcome.win  { color: var(--green); }
    .result-outcome.lose { color: var(--red);   }

    .result-country {
      font-size: 1.1rem;
      color: var(--muted);
    }

    .result-country strong { color: var(--text); }

    .emoji-card {
      font-size: 1.8rem;
      letter-spacing: 3px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px;
      line-height: 1.4;
    }

    .btn-copy {
      padding: 10px 24px;
      border: 1.5px solid var(--accent);
      border-radius: 99px;
      background: transparent;
      color: var(--accent);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, color .2s;
      align-self: center;
    }

    .btn-copy:hover { background: var(--accent); color: #fff; }

    .copy-confirm {
      font-size: .82rem;
      color: var(--green);
      min-height: 1em;
    }

    /* ── Already played banner ── */
    .played-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      text-align: center;
      color: var(--muted);
      font-size: .92rem;
      display: none;
    }

    .played-banner.show { display: block; }
    .played-banner strong { color: var(--text); }

    .next-reset {
      font-size: .8rem;
      margin-top: 8px;
      color: var(--muted);
    }

    /* ── Wrong guess feedback ── */
    .wrong-shake {
      animation: shake .35s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      60%      { transform: translateX(6px); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .logo { font-size: 1.25rem; }
      main { padding: 18px 14px 32px; gap: 18px; }
    }
  </style>
</head>

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getDailyIndex() {
  // Deterministic day index based on ISO date string
  const key = getTodayKey();
  let hash = 0;
  for (let i = 0; i < key.length; i++) hash = (hash * 31 + key.charCodeAt(i)) >>> 0;
  return hash % DAILY_DATA.length;
}

function msUntilMidnight() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  return midnight - now;
}

function formatTimeUntilMidnight() {
  const ms = msUntilMidnight();
  const h  = Math.floor(ms / MS_PER_HOUR);
  const m  = Math.floor((ms % MS_PER_HOUR) / MS_PER_MINUTE);
  return `Next photo in ${h}h ${m}m`;
}

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
const STORAGE_KEY        = 'worldsnap_result_v1';
const STREAK_KEY         = 'worldsnap_streak_v1';
const MAX_ATTEMPTS       = 3;
const MAX_DROPDOWN_ITEMS = 8;
const MS_PER_HOUR        = 3_600_000;
const MS_PER_MINUTE      = 60_000;

let state = {
  day:           getTodayKey(),
  dailyEntry:    DAILY_DATA[getDailyIndex()],
  attempts:      0,        // guesses made so far
  hintsShown:    0,        // number of hints revealed
  guesses:       [],       // array of { country, correct }
  finished:      false,
  won:           false
};

// ════════════════════════════════════════════
//  STREAK HELPERS
// ════════════════════════════════════════════
function loadStreak() {
  try {
    const raw = localStorage.getItem(STREAK_KEY);
    return raw ? JSON.parse(raw) : { count: 0, lastWonDay: '' };
  } catch { return { count: 0, lastWonDay: '' }; }
}

function saveStreak(streak) {
  localStorage.setItem(STREAK_KEY, JSON.stringify(streak));
}

function updateStreakOnWin() {
  const streak = loadStreak();
  const today  = getTodayKey();
  const yesterday = (() => {
    const d = new Date(); d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();

  if (streak.lastWonDay === today) return; // already counted today

  if (streak.lastWonDay === yesterday) {
    streak.count += 1;
  } else {
    streak.count = 1; // restart streak
  }
  streak.lastWonDay = today;
  saveStreak(streak);
}

function breakStreakOnLoss() {
  const streak = loadStreak();
  const today  = getTodayKey();
  if (streak.lastWonDay !== today) {
    // Only break if we haven't won today yet (streak not saved as win)
    streak.count = 0;
    saveStreak(streak);
  }
}

// ════════════════════════════════════════════
//  LOCALSTORAGE SAVE / LOAD
// ════════════════════════════════════════════
function loadStoredResult() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (data.day !== getTodayKey()) return null; // stale day
    return data;
  } catch { return null; }
}

function saveResult() {
  const data = {
    day:       state.day,
    attempts:  state.attempts,
    guesses:   state.guesses,
    finished:  state.finished,
    won:       state.won,
    hintsShown: state.hintsShown
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ════════════════════════════════════════════
//  EMOJI RESULT CARD
// ════════════════════════════════════════════
function buildEmojiCard() {
  // one square per attempt slot
  const squares = state.guesses.map(g => g.correct ? '🟩' : '🟥');
  // pad remaining slots as neutral
  while (squares.length < MAX_ATTEMPTS) squares.push('⬛');

  const attemptsUsed = state.guesses.length;
  const scoreText    = state.won ? `${attemptsUsed}/${MAX_ATTEMPTS}` : 'X/3';
  return `🌍 WorldSnap ${state.day}\n${squares.join('')}\n${scoreText}`;
}

// ════════════════════════════════════════════
//  UI UPDATES
// ════════════════════════════════════════════
const $ = id => document.getElementById(id);

function renderStreak() {
  $('streak-count').textContent = loadStreak().count;
}

function renderAttemptPips() {
  for (let i = 0; i < MAX_ATTEMPTS; i++) {
    const pip = $(`pip-${i}`);
    pip.className = 'attempt-pip';
    if (i < state.guesses.length) {
      pip.classList.add(state.guesses[i].correct ? 'used-correct' : 'used-wrong');
    }
  }
}

function renderHints() {
  const list = $('hints-list');
  list.innerHTML = '';
  for (let i = 0; i < state.hintsShown; i++) {
    const hint = state.dailyEntry.hints[i];
    if (!hint) continue;
    const div = document.createElement('div');
    div.className = 'hint-item';
    div.innerHTML = `<span class="hint-icon">💡</span><span>${hint}</span>`;
    list.appendChild(div);
  }
}

function showResult() {
  const outcomeEl = $('result-outcome');
  const countryEl = $('result-country');
  const emojiEl   = $('emoji-card');
  const resultSec = $('result-section');

  if (state.won) {
    outcomeEl.textContent = '🎉 Correct!';
    outcomeEl.className   = 'result-outcome win';
  } else {
    outcomeEl.textContent = '😞 Better luck tomorrow!';
    outcomeEl.className   = 'result-outcome lose';
  }

  countryEl.innerHTML = `The answer was <strong>${state.dailyEntry.country}</strong>`;
  emojiEl.textContent = buildEmojiCard();

  resultSec.classList.add('show');

  // Reveal the photo fully
  $('daily-photo').classList.remove('blurred');
  $('photo-label').textContent = `📍 ${state.dailyEntry.country}`;
}

function lockUI() {
  $('input-group').style.display    = 'none';
  $('btn-guess').style.display      = 'none';
}

function showPlayedBanner() {
  $('played-banner').classList.add('show');
  $('next-reset').textContent = formatTimeUntilMidnight();
  lockUI();
}

// ════════════════════════════════════════════
//  DROPDOWN
// ════════════════════════════════════════════
let highlightIndex = -1;

function openDropdown(items) {
  const dd = $('dropdown');
  dd.innerHTML = '';
  highlightIndex = -1;

  if (items.length === 0) {
    const el = document.createElement('div');
    el.className = 'dropdown-item no-match';
    el.textContent = 'No countries found';
    dd.appendChild(el);
  } else {
    items.slice(0, MAX_DROPDOWN_ITEMS).forEach((country, idx) => {
      const el = document.createElement('div');
      el.className = 'dropdown-item';
      el.setAttribute('role', 'option');
      el.textContent = country;
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        selectCountry(country);
      });
      dd.appendChild(el);
    });
  }
  dd.classList.add('open');
}

function closeDropdown() {
  $('dropdown').classList.remove('open');
  highlightIndex = -1;
}

function highlightItem(delta) {
  const items = $('dropdown').querySelectorAll('.dropdown-item:not(.no-match)');
  if (!items.length) return;
  items[highlightIndex]?.classList.remove('active');
  if (highlightIndex === -1) {
    highlightIndex = delta > 0 ? 0 : items.length - 1;
  } else {
    highlightIndex = Math.max(0, Math.min(highlightIndex + delta, items.length - 1));
  }
  items[highlightIndex].classList.add('active');
  items[highlightIndex].scrollIntoView({ block: 'nearest' });
}

function selectCountry(country) {
  $('country-input').value = country;
  closeDropdown();
}

$('country-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { closeDropdown(); return; }
  const matches = ALL_COUNTRIES.filter(c => c.toLowerCase().includes(q));
  openDropdown(matches);
});

$('country-input').addEventListener('keydown', function(e) {
  if (e.key === 'ArrowDown') { e.preventDefault(); highlightItem(1); return; }
  if (e.key === 'ArrowUp')   { e.preventDefault(); highlightItem(-1); return; }
  if (e.key === 'Enter') {
    const items = $('dropdown').querySelectorAll('.dropdown-item:not(.no-match)');
    if (highlightIndex >= 0 && items[highlightIndex]) {
      selectCountry(items[highlightIndex].textContent);
    } else {
      submitGuess();
    }
    return;
  }
  if (e.key === 'Escape') { closeDropdown(); }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.input-group')) closeDropdown();
});

// ════════════════════════════════════════════
//  GUESS LOGIC
// ════════════════════════════════════════════
function submitGuess() {
  if (state.finished) return;

  const input   = $('country-input');
  const guessed = input.value.trim();

  if (!guessed) {
    input.classList.add('wrong-shake');
    input.addEventListener('animationend', () => input.classList.remove('wrong-shake'), { once: true });
    return;
  }

  // Validate it's a real country in our list
  const matched = ALL_COUNTRIES.find(c => c.toLowerCase() === guessed.toLowerCase());
  if (!matched) {
    input.classList.add('wrong-shake');
    input.addEventListener('animationend', () => input.classList.remove('wrong-shake'), { once: true });
    input.placeholder = 'Please select a country from the list';
    setTimeout(() => { input.placeholder = 'Type a country name…'; }, 2000);
    return;
  }

  const correct = matched.toLowerCase() === state.dailyEntry.country.toLowerCase();

  state.attempts++;
  state.guesses.push({ country: matched, correct });

  renderAttemptPips();
  input.value = '';
  closeDropdown();

  if (correct) {
    state.won      = true;
    state.finished = true;
    updateStreakOnWin();
    renderStreak();
    saveResult();
    lockUI();
    showResult();
    return;
  }

  // Wrong guess — reveal next hint
  if (state.hintsShown < state.dailyEntry.hints.length) {
    state.hintsShown++;
    renderHints();
  }

  if (state.attempts >= MAX_ATTEMPTS) {
    state.finished = true;
    breakStreakOnLoss();
    renderStreak();
    saveResult();
    lockUI();
    showResult();
    return;
  }

  // Shake input to signal wrong guess
  const ig = $('input-group');
  ig.classList.add('wrong-shake');
  ig.addEventListener('animationend', () => ig.classList.remove('wrong-shake'), { once: true });

  saveResult(); // persist partial progress
}

$('btn-guess').addEventListener('click', submitGuess);

// ════════════════════════════════════════════
//  COPY TO CLIPBOARD
// ════════════════════════════════════════════
$('btn-copy').addEventListener('click', async () => {
  const text = buildEmojiCard();
  try {
    await navigator.clipboard.writeText(text);
    $('copy-confirm').textContent = '✅ Copied to clipboard!';
  } catch {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity  = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    $('copy-confirm').textContent = '✅ Copied to clipboard!';
  }
  setTimeout(() => { $('copy-confirm').textContent = ''; }, 3000);
});

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
function init() {
  renderStreak();

  // Set photo
  const img = $('daily-photo');
  img.src = state.dailyEntry.imageUrl;

  const stored = loadStoredResult();

  if (stored) {
    // Restore finished state from storage
    state.attempts   = stored.attempts;
    state.guesses    = stored.guesses;
    state.finished   = stored.finished;
    state.won        = stored.won;
    // hintsShown was added later; for older stored results, estimate from wrong guesses.
    // This relies on the invariant that one hint is revealed per wrong guess.
    state.hintsShown = stored.hintsShown ?? stored.guesses.filter(g => !g.correct).length;

    renderAttemptPips();
    renderHints();

    if (state.finished) {
      showResult();
      showPlayedBanner();
    }
    return;
  }

  // Fresh game — photo starts blurred
  img.classList.add('blurred');
}

init();

// Auto-reset UI at midnight (page reload)
setTimeout(() => { location.reload(); }, msUntilMidnight() + 1000);
</script>
